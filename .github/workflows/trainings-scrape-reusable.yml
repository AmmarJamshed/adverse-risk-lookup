name: Trainings scrape (reusable)

on:
  workflow_call:
    inputs:
      country:
        description: Country to scrape
        required: true
        type: string
      commit:
        description: Commit and push data changes
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      country:
        description: Country to scrape
        required: true
        type: choice
        options:
          - Saudi Arabia
          - Bahrain
          - Qatar
          - Oman
          - Germany
          - France
          - Czech Republic
          - Netherlands
          - Canada
          - Japan
          - Malaysia
          - Singapore

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright
          python -m playwright install --with-deps chromium

      - name: Scrape country + merge seed
        env:
          ARL_TRAININGS_PAUSE_MS: "15000"
          COUNTRY: ${{ inputs.country }}
        run: |
          set -euo pipefail
          echo "Scraping: $COUNTRY"
          python scripts/scrape_trainings.py --country "$COUNTRY" || true
          python scripts/merge_seed_trainings.py

      - name: Commit updated training data
        if: ${{ inputs.commit == true || github.event_name == 'workflow_dispatch' }}
        env:
          COUNTRY: ${{ inputs.country }}
        run: |
          git config user.name "arl-trainings-bot"
          git config user.email "bot@arl.local"
          git pull --rebase origin HEAD || true
          git add data/trainings frontend/public/data/trainings.json frontend/netlify/functions/trainings-data.json
          if git diff --staged --quiet; then
            echo "No training data changes for $COUNTRY"
          else
            git commit -m "chore: weekly trainings scrape ($COUNTRY)"
            git push
          fi
