# Manual/full-run orchestrator: scrapes every country one after another.
# Scheduled load is split across per-country workflows (trainings-*.yml).
name: Weekly trainings (all countries sequential)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  saudi-arabia:
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: Saudi Arabia
      commit: true
    secrets: inherit

  bahrain:
    needs: saudi-arabia
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: Bahrain
      commit: true
    secrets: inherit

  qatar:
    needs: bahrain
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: Qatar
      commit: true
    secrets: inherit

  oman:
    needs: qatar
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: Oman
      commit: true
    secrets: inherit

  germany:
    needs: oman
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: Germany
      commit: true
    secrets: inherit

  france:
    needs: germany
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: France
      commit: true
    secrets: inherit

  czech-republic:
    needs: france
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: Czech Republic
      commit: true
    secrets: inherit

  netherlands:
    needs: czech-republic
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: Netherlands
      commit: true
    secrets: inherit

  canada:
    needs: netherlands
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: Canada
      commit: true
    secrets: inherit

  japan:
    needs: canada
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: Japan
      commit: true
    secrets: inherit

  malaysia:
    needs: japan
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: Malaysia
      commit: true
    secrets: inherit

  singapore:
    needs: malaysia
    uses: ./.github/workflows/trainings-scrape-reusable.yml
    with:
      country: Singapore
      commit: true
    secrets: inherit
