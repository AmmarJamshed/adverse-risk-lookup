# Netlify: set base directory to `frontend` in site settings,
# or deploy from this root using the frontend subdirectory.

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "/api"

[[redirects]]
  from = "/api/*"
  to = "https://YOUR-ARL-API.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
