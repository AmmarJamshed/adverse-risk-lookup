[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "/api"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Free serverless API — path forwarded as query for reliable routing
[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/arl?path=/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/arl?path=/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
